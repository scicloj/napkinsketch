format:
  html:
    toc: true
    toc-depth: 4
    theme: [cosmo, notebooks/custom.scss]
    toc-expand: false
    number-depth: 1
    include-after-body:
      text: |2

                <script>
                document.addEventListener('DOMContentLoaded', function () {
                  document.querySelectorAll('#TOC a').forEach(function (link) {
                    const parent = link.parentElement;
                    const siblings = parent.querySelector('ul');
                    if (siblings) {
                      const chevron = document.createElement('span');
                      chevron.textContent = '▶';
                      chevron.style.cssText = `
                        display: inline-block;
                        margin-left: 8px;
                        transition: transform 0.25s ease;
                        font-size: 1em;
                        color: #2780e3;
                        vertical-align: middle;
                      `;
                      link.appendChild(chevron);
                      link.style.cursor = 'pointer';
                      link.style.fontWeight = 'bold';

                      link.addEventListener('click', function (e) {
                        e.preventDefault();
                        const isOpen = siblings.style.display !== 'none';
                        siblings.style.display = isOpen ? 'none' : 'block';
                        chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
                      });
                    }
                  });
                });
                </script>
  revealjs: {theme: solarized, navigation-mode: vertical, transition: slide, background-transition: fade, incremental: true}
